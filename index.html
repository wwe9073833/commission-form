<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUMPLING ® ART 委託創作系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
    body { 
        background: #8B0000; 
        padding: 15px; /* 手機版邊距縮小一點點 */
        font-family: 'Noto Serif TC', serif; 
        color: #333;
        letter-spacing: 0.05rem;
        word-break: keep-all; /* 避免中文字被奇怪地斷開 */
    }
    
    .container { 
        max-width: 600px; 
        background: white; 
        padding: 25px; 
        border-radius: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
    }

    /* 💡 針對標題文字跑掉的修正 */
    .header {
        text-align: center;
        margin-bottom: 25px;
    }

    .header h2 {
        font-weight: 700;
        letter-spacing: 0.1rem;
        font-size: 1.5rem; /* 固定一個適合手機的大小 */
        line-height: 1.4;
        white-space: nowrap; /* 💡 強制標題不准斷行 */
        overflow: hidden;
        text-overflow: ellipsis; /* 如果真的太長就變點點點，但你的字數應該剛好 */
    }

    /* 讓輸入框在手機上不要看起來太硬 */
    .form-control, .form-select {
        border-radius: 8px;
        font-family: 'Noto Serif TC', serif; /* 輸入框也統一字體 */
    }

    .price-tag { 
        font-size: 1.4rem; 
        color: #8B0000;
        font-weight: bold; 
    }

    /* 手機版 RWD 調整 */
    @media (max-width: 480px) {
        .header h2 {
            font-size: 1.25rem; /* 手機更小的時候再縮一點 */
        }
        .container {
            padding: 20px;
        }
    }

    #submitBtn:hover {
        background-color: #a00000 !important;
        box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4);
    }
</style>
</head>

<body>

<div class="container mx-auto">
    <div class="header"><h2>👄DUMPLING 委託畫作</h2></div>
    
    <form id="orderForm">
        <div class="mb-3"><label>姓名 (全名) *</label><input type="text" id="name" class="form-control" required></div>
        <div class="mb-3"><label>Instagram 帳號 *</label><input type="text" id="ig" class="form-control" required></div>
        <div class="mb-3"><label>E-mail *</label><input type="email" id="email" class="form-control" required></div>
        <div class="mb-3"><label>聯絡方式 *</label><input type="text" id="contact" class="form-control" required></div>
        <div class="mb-3"><label>門市 (寄件用)</label><input type="text" id="store" class="form-control"></div>

        <hr>

        <div class="mb-3">
            <label>你想要畫哪一種呢？ *</label>
            <select id="drawType" class="form-select" onchange="updateUI()" required>
                <option value="0" disabled selected>請選擇...</option>
                <option value="450">一般似顏繪 $450</option>
                <option value="580">委託客製圖 $580</option>
            </select>
        </div>

        <div id="noteArea" class="mb-3" style="display:none;">
            <label id="noteLabel" class="fw-bold"></label>
            <textarea id="note" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label>上傳參考照片 *</label>
            <input type="file" id="fileInput" class="form-control" accept="image/*" required>
        </div>

        <hr>

        <div class="mb-3">
            <label>是否製成商品？</label>
            <select id="isProduct" class="form-select" onchange="updateUI()">
                <option value="否">否</option>
                <option value="是">是</option>
            </select>
        </div>

        <div id="productArea" style="display:none;">
            <div class="row mb-2">
                <div class="col-8">明信片 (4張/份) $40</div>
                <div class="col-4"><input type="number" id="qtyPostcard" class="form-control" value="0" min="0" onchange="updateUI()"></div>
            </div>
            <div class="row mb-2">
                <div class="col-8">吊飾 $50/個</div>
                <div class="col-4"><input type="number" id="qtyCharm" class="form-control" value="0" min="0" onchange="updateUI()"></div>
            </div>
        </div>

        <hr>

        <div class="text-end">
            <span>運費：$<span id="shippingDisplay">0</span></span><br>
            <span class="fw-bold">總金額：</span><span class="price-tag" id="totalPrice">$0</span>
        </div>

        <button type="submit" class="btn w-100 mt-4 py-3 fw-bold" id="submitBtn" style="background-color: #8B0000; color: white; border: none; transition: 0.3s;">確認送出並顯示匯款帳號</button>
    </form>

    <div id="bankInfo" class="bank-info" style="display: none; margin-top: 20px; padding: 20px 15px; background: #ffffff; border-radius: 15px; border: 2px solid #8B0000; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h4 class="fw-bold mb-3" style="color: #8B0000; font-size: 1.25rem;">🎉 感謝你的支持</h4>
        <p class="mb-2" style="font-size: 0.95rem;">請將金額匯至以下帳號：</p>
        
        <div style="background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 20px;">
            <ul class="list-unstyled mb-0" style="font-size: 0.9rem; line-height: 1.8;">
                <li style="white-space: nowrap;">
                    <strong>🔹 銀　行：</strong>台新銀行 (812)
                </li>
                <li style="white-space: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;">
                    <strong>🔹 帳　號：</strong><span style="font-family: 'Courier New', Courier, monospace; letter-spacing: 0px;">28881004315222</span>
                </li>
            </ul>
        </div>
        
        <p class="mb-3" style="font-size: 0.9rem; line-height: 1.5;">請於匯款後，點擊下方按鈕加入官方 LINE 傳送<strong>匯款截圖</strong>或<strong>後五碼</strong>，餃子收到後會盡快安排喔！😆</p>
        
        <a href="https://line.me/R/ti/p/@659jchwf" target="_blank" style="text-decoration: none;">
            <div style="background: #8B0000; color: white; padding: 12px; border-radius: 50px; text-align: center; font-weight: bold; font-size: 1rem; box-shadow: 0 4px 10px rgba(139,0,0,0.2);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="20" style="margin-right: 8px; filter: brightness(0) invert(1); vertical-align: middle;">
                加好友傳截圖
            </div>
        </a>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx0ZtlF-Vh6lLMuOu9Jvfq8n8pPmHLONQrI-1pez5bvaB0KT4-QZ3xzuwilSjSgw8Ki4Q/exec";

    function updateUI() {
        let drawPrice = parseInt(document.getElementById('drawType').value) || 0;
        let isProduct = document.getElementById('isProduct').value;
        let qtyPostcard = parseInt(document.getElementById('qtyPostcard').value) || 0;
        let qtyCharm = parseInt(document.getElementById('qtyCharm').value) || 0;
        
        const noteArea = document.getElementById('noteArea');
        const noteLabel = document.getElementById('noteLabel');
        if(drawPrice === 450) {
            noteArea.style.display = 'block';
            noteLabel.innerText = "一般似顏繪備註 (照片中必畫部分說明)：";
        } else if (drawPrice === 580) {
            noteArea.style.display = 'block';
            noteLabel.innerText = "委託客製圖備註 (詳細說明希望呈現樣子)：";
        }

        const productArea = document.getElementById('productArea');
        let shippingFee = (isProduct === '是') ? 60 : 0;
        productArea.style.display = (isProduct === '是') ? 'block' : 'none';

        let total = drawPrice + (qtyPostcard * 40) + (qtyCharm * 50) + shippingFee;
        
        document.getElementById('shippingDisplay').innerText = shippingFee;
        document.getElementById('totalPrice').innerText = "$" + total;
    }

    // 💡 強力圖片壓縮函式
    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 800; // 限制最大寬度為 800px
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // 壓縮品質 0.7
                };
            };
        });
    }

    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "圖片優化與上傳中...";

        const fileInput = document.getElementById('fileInput');
        let fileData = null;
        if (fileInput.files.length > 0) {
            fileData = await compressImage(fileInput.files[0]); // 使用壓縮
        }

        const payload = {
            name: document.getElementById('name').value,
            ig: document.getElementById('ig').value,
            email: document.getElementById('email').value,
            contact: document.getElementById('contact').value,
            store: document.getElementById('store').value,
            type: document.getElementById('drawType').selectedOptions[0].text,
            note: document.getElementById('note').value,
            isProduct: document.getElementById('isProduct').value,
            productDetails: `明信片:${document.getElementById('qtyPostcard').value}, 吊飾:${document.getElementById('qtyCharm').value}`,
            totalAmount: document.getElementById('totalPrice').innerText.replace("$",""),
            fileData: fileData,
            fileName: fileInput.files[0].name
        };

        fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
        .then(() => {
            document.getElementById('bankInfo').style.display = 'block';
            btn.style.display = 'none';
            window.scrollTo(0, document.body.scrollHeight);
        })
        .catch(err => {
            alert("上傳失敗，請檢查網路或聯繫畫師");
            btn.disabled = false; btn.innerText = "重新送出";
        });
    });
</script>
</body>
</html>
