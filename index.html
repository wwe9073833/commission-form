<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUMPLING ® ART 委託創作系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
    body { 
        background: #8B0000; 
        padding: 15px; 
        font-family: 'Noto Serif TC', serif; 
        color: #333;
        letter-spacing: 0.05rem;
        word-break: keep-all;
    }
    
    .container { 
        max-width: 600px; 
        background: white; 
        padding: 25px; 
        border-radius: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
    }

    .header {
        text-align: center;
        margin-bottom: 25px;
    }

    .header img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 10px;
        border: 2px solid #8B0000;
        object-fit: cover;
    }

    .header h2 {
        font-weight: 700;
        letter-spacing: 0.1rem;
        font-size: 1.5rem;
        line-height: 1.4;
    }

    .form-label {
        font-weight: 700;
        color: #555;
    }

    .form-control, .form-select {
        border-radius: 8px;
        font-family: 'Noto Serif TC', serif;
    }

    .price-tag { 
        font-size: 1.5rem; 
        color: #8B0000;
        font-weight: bold; 
    }

    /* 金額明細區塊 */
    .price-detail-box {
        background: #fff9f9;
        padding: 15px;
        border-radius: 12px;
        border: 1px dashed #8B0000;
        margin-bottom: 20px;
    }

    @media (max-width: 480px) {
        .header h2 { font-size: 1.25rem; }
        .container { padding: 20px; }
    }

    #submitBtn:hover:not(:disabled) {
        background-color: #a00000 !important;
        box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4);
        transform: translateY(-2px);
    }

    /* 讓明細表的小計文字在手機上不會太擠 */
    .price-detail-box span {
        font-size: 0.95rem;
    }
    /* 加強轉圈圈動畫的顏色 */
    .spinner-border {
        color: white !important;
    }
    
</style>
</head>

<body>

<div class="container mx-auto">
    <div class="header">
        <img src="logo.png" alt="DUMPLING ART LOGO">
        <h2>DUMPLING ® ART</h2>
        <p style="font-size: 0.85rem; color: #8B0000; letter-spacing: 2px;">委 託 創 作 系 統</p>
    </div>
    
    <form id="orderForm">
        <div class="mb-3">
            <label class="form-label">姓名 (全名) <span class="text-danger">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="例如：歐萊恩" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Instagram 帳號 <span class="text-danger">*</span></label>
            <input type="text" id="ig" class="form-control" placeholder="dumpling_arrrt" required>
        </div>
        <div class="mb-3">
            <label class="form-label">E-mail <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
        </div>

        

        <div class="mb-3">
            <label class="form-label">你想要畫哪一種呢？ <span class="text-danger">*</span></label>
            <select id="drawType" class="form-select" onchange="updateUI()" required>
                <option value="0" disabled selected>請選擇...</option>
                <option value="450">一般似顏繪 $450</option>
                <option value="580">委託客製圖 $580</option>
            </select>
        </div>

        <div id="noteArea" class="mb-3" style="display:none;">
            <label id="noteLabel" class="fw-bold mb-2"></label>
            <textarea id="note" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">上傳參考照片 <span class="text-danger">*</span></label>
            <input type="file" id="fileInput" class="form-control" accept="image/*" required onchange="previewImage(this)">
            <div id="imagePreviewContainer" class="mt-3" style="display: none;">
                <p style="font-size: 0.8rem; color: #666;">📸 照片預覽：</p>
                <img id="imagePreview" src="#" alt="預覽圖" style="max-width: 100%; border-radius: 10px; border: 1px solid #ddd;">
            </div>
        </div>

        <hr class="my-4">

        <div class="mb-3">
            <label class="form-label">是否製成商品？</label>
            <select id="isProduct" class="form-select" onchange="updateUI()">
                <option value="否">否 (僅需電子檔)</option>
                <option value="是">是 (加購實體商品)</option>
            </select>
        </div>

        <div class="mb-3" id="contactArea" style="display:none;">
            <label class="form-label">聯絡方式 <span class="text-danger">*</span></label>
            <input type="text" id="contact" class="form-control" placeholder="請填寫手機號碼">
        </div>

        <div class="mb-3" id="storeArea" style="display:none;">
            <label class="form-label">7-11門市 (寄件用) <span class="text-danger">*</span></label>
            <input type="text" id="store" class="form-control" placeholder="加購商品請填寫 7-11 門市名稱">
        </div>

        <div id="productArea" style="display:none; background: #fefefe; padding: 15px; border-radius: 10px; border: 1px inset #eee;">
            <div class="row mb-3 align-items-center">
                <div class="col-7">明信片 (4張/份) <span class="text-muted" style="font-size: 0.8rem;">$40</span></div>
                <div class="col-5"><input type="number" id="qtyPostcard" class="form-control" value="0" min="0" onchange="updateUI()"></div>
            </div>
            <div class="row mb-2 align-items-center">
                <div class="col-7">吊飾 <span class="text-muted" style="font-size: 0.8rem;">$50/個</span></div>
                <div class="col-5"><input type="number" id="qtyCharm" class="form-control" value="0" min="0" onchange="updateUI()"></div>
            </div>
        </div>

        <hr class="my-4">

        <div class="price-detail-box">
            <div class="d-flex justify-content-between mb-2" style="font-size: 0.9rem;">
                <span>🎨 畫稿費用</span>
                <span id="detailDraw">$0</span>
            </div>
            <div class="d-flex justify-content-between mb-2" style="font-size: 0.9rem;">
                <span>📦 商品小計</span>
                <span id="detailProduct">$0</span>
            </div>
            <div class="d-flex justify-content-between mb-2" style="font-size: 0.9rem;">
                <span>🚚 運費 (實體寄送)</span>
                <span id="detailShipping">$0</span>
            </div>
            <div class="d-flex justify-content-between align-items-center border-top pt-2 mt-2">
                <span class="fw-bold">總金額</span>
                <span class="price-tag" id="totalPrice">$0</span>
            </div>
        </div>

        <button type="submit" class="btn w-100 mt-2 py-3 fw-bold" id="submitBtn" style="background-color: #8B0000; color: white; border: none; transition: 0.3s;">確認送出並顯示匯款帳號</button>
    </form>

    <div id="bankInfo" class="bank-info" style="display: none; margin-top: 20px; padding: 20px 15px; background: #ffffff; border-radius: 15px; border: 2px solid #8B0000; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h4 class="fw-bold mb-3" style="color: #8B0000; text-align: center;">🎉 感謝你的支持</h4>
        
        <div style="background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <ul class="list-unstyled mb-0" style="font-size: 0.9rem; line-height: 2;">
                <li style="white-space: nowrap;"><strong>🔹 銀　行：</strong>台新銀行 (812)</li>
                <li style="white-space: nowrap;"><strong>🔹 帳　號：</strong><span style="font-family: 'Courier New', Courier, monospace;">28881004315222</span></li>
            </ul>
        </div>
        
        <p class="mb-4" style="font-size: 0.95rem; line-height: 1.8; color: #444; text-align: center;">
             請於匯款後，點擊下方按鈕加入官方 LINE<br>
             主動傳送 <strong style="color:#8B0000;">「訂單編號」</strong> 並附上<br>
             <strong>匯款截圖</strong> 或 <strong>後五碼</strong><br>
             餃子收到後會根據編號快速為您核對！😆
            </p>
        
        <a href="https://line.me/R/ti/p/@659jchwf" target="_blank" style="text-decoration: none; display: block;">
            <div style="background: #8B0000; color: white; padding: 14px; border-radius: 50px; text-align: center; font-weight: bold; font-size: 1.05rem; box-shadow: 0 4px 12px rgba(139,0,0,0.25);">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" width="22" style="margin-right: 8px; filter: brightness(0) invert(1); vertical-align: middle; margin-top: -3px;">
                加入好友傳截圖
            </div>
        </a>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyTOVcryB_6_fuoxmlmQIXUTrFlnQh56YPcOHVcVIqw6pE7NgrA3L-qOGTvTeGRad8A/exec";
    
    // 💡 1. 加入變數與攔截監聽
    let isSubmitting = false; 
    window.addEventListener('beforeunload', (e) => {
        if (isSubmitting) {
            e.preventDefault();
            e.returnValue = ''; 
        }
    });

    // 圖片預覽
    function previewImage(input) {
        const container = document.getElementById('imagePreviewContainer');
        const preview = document.getElementById('imagePreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                container.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // UI 動態邏輯
    function updateUI() {
        let drawPrice = parseInt(document.getElementById('drawType').value) || 0;
        let isProduct = document.getElementById('isProduct').value;
        let qtyPostcard = parseInt(document.getElementById('qtyPostcard').value) || 0;
        let qtyCharm = parseInt(document.getElementById('qtyCharm').value) || 0;
        
        // 1. 備註欄邏輯
        const noteArea = document.getElementById('noteArea');
        const noteLabel = document.getElementById('noteLabel');
        const noteInput = document.getElementById('note');
        if(drawPrice === 450) {
            noteArea.style.display = 'block';
            noteLabel.innerText = "備註📝 (畫作與提供的照片類似)：";
            noteInput.placeholder = "照片中有一定得畫出來的部分請說明...";
        } else if (drawPrice === 580) {
            noteArea.style.display = 'block';
            noteLabel.innerText = "備註📝 (詳細說明希望作品呈現的樣子)：";
            noteInput.placeholder = "例：兩個人要抱著、要有特定背景...";
        }

        // 2. 連動顯示邏輯
        const productArea = document.getElementById('productArea');
        const storeArea = document.getElementById('storeArea'); 
        const storeInput = document.getElementById('store');
        const contactArea = document.getElementById('contactArea');
        const contactInput = document.getElementById('contact');
        
        let productSubtotal = (qtyPostcard * 40) + (qtyCharm * 50);
        let shippingFee = 0;

        if (isProduct === '是') {
            productArea.style.display = 'block';
            storeArea.style.display = 'block'; 
            storeInput.required = true;
            contactArea.style.display = 'block';
            contactInput.required = true;
            shippingFee = 60;
        } else {
            productArea.style.display = 'none';
            storeArea.style.display = 'none'; 
            storeInput.required = false;
            contactArea.style.display = 'none';
            contactInput.required = false;
            shippingFee = 0;
        }

        // 3. 金額更新
        const drawElem = document.getElementById('detailDraw');
        const prodElem = document.getElementById('detailProduct');
        const shipElem = document.getElementById('detailShipping');

        drawElem.innerText = "$" + drawPrice;
        drawElem.style.color = drawPrice > 0 ? "#333" : "#ccc";
        prodElem.innerText = "$" + productSubtotal;
        prodElem.style.color = productSubtotal > 0 ? "#333" : "#ccc";
        shipElem.innerText = "$" + shippingFee;
        shipElem.style.color = shippingFee > 0 ? "#333" : "#ccc";

        let total = drawPrice + productSubtotal + shippingFee;
        document.getElementById('totalPrice').innerText = "$" + total.toLocaleString();

        // 4. 按鈕狀態檢查
        const btn = document.getElementById('submitBtn');
        if (drawPrice === 0) {
            btn.disabled = true;
            btn.innerText = "請先選擇委託畫作類型";
            btn.style.opacity = "0.6";
        } else if (isProduct === '是' && productSubtotal === 0) {
            btn.disabled = true;
            btn.innerText = "請填寫加購商品數量 (或選否)";
            btn.style.opacity = "0.6";
        } else {
            btn.disabled = false;
            btn.innerText = "確認送出並顯示匯款帳號";
            btn.style.opacity = "1";
        }
    }

    // 圖片壓縮邏輯
    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max_size = 1200; // 稍微提升細緻度
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });
    }

    // 表單送出
    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // 💡 新增：生成訂單編號 (DA + 年月日 + 4位隨機碼)
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        const randomStr = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        const orderId = "DA-" + dateStr + "-" + randomStr;

        isSubmitting = true; 

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; 
        btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 餃子正在接收照片...';

        const fileInput = document.getElementById('fileInput');
        let fileData = null;
        if (fileInput.files.length > 0) {
            fileData = await compressImage(fileInput.files[0]);
        }

        const payload = {
            orderId: orderId, // 💡 新增這一行：傳送到後端
            name: document.getElementById('name').value,
            ig: document.getElementById('ig').value,
            email: document.getElementById('email').value,
            contact: document.getElementById('contact').value,
            store: document.getElementById('store').value,
            type: document.getElementById('drawType').selectedOptions[0].text,
            note: document.getElementById('note').value,
            isProduct: document.getElementById('isProduct').value,
            productDetails: `明信片:${document.getElementById('qtyPostcard').value}, 吊飾:${document.getElementById('qtyCharm').value}`,
            totalAmount: document.getElementById('totalPrice').innerText.replace("$",""),
            fileData: fileData,
            fileName: fileInput.files[0].name
        };

        fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
        .then(() => {
            isSubmitting = false; 

            const bankBox = document.getElementById('bankInfo');
            
            // 💡 優化後的顯示邏輯：包含編號與複製按鈕
            const idDisplayHtml = `
                <div id="orderIdContainer" style="text-align:center; margin-bottom:20px; background:#fdf2f2; border:1px solid #8B0000; padding:15px; border-radius:12px;">
                    <div style="font-size:0.85rem; color:#8B0000; margin-bottom:5px;">您的訂單編號</div>
                    <div id="orderIdText" style="font-size:1.4rem; font-weight:bold; color:#8B0000; letter-spacing:1px; margin-bottom:10px;">${orderId}</div>
                    <button type="button" onclick="copyOrderId('${orderId}')" style="background:#8B0000; color:white; border:none; padding:5px 15px; border-radius:50px; font-size:0.85rem; cursor:pointer; transition:0.3s;">
                        複製編號
                    </button>
                    <div id="copyMsg" style="font-size:0.75rem; color:green; margin-top:5px; display:none;">✅已複製到剪貼簿</div>
                </div>
            `;
            
            if(!document.getElementById('orderIdContainer')){
                bankBox.insertAdjacentHTML('afterbegin', idDisplayHtml);
            }

            bankBox.style.display = 'block';
            document.getElementById('orderForm').style.display = 'none';
            window.scrollTo(0, 0);
        })

        .catch(err => {
            isSubmitting = false; 
            alert("上傳失敗，請檢查網路或聯繫餃子！");
            btn.disabled = false; btn.innerText = "重新送出";
        });
    });

    // 💡 複製訂單編號的功能
    function copyOrderId(text) {
        navigator.clipboard.writeText(text).then(() => {
            const msg = document.getElementById('copyMsg');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 2000);
        }).catch(err => {
            // 防呆：如果瀏覽器不支援 clipboard API
            alert("複製失敗，請手動紀錄編號：" + text);
        });
    }
</script>
</body>
</html>
