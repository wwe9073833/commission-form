<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUMPLING ® ART 委託系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; font-family: "Microsoft JhengHei"; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #00b900; padding-bottom: 10px; }
        .price-tag { font-size: 1.5rem; color: #d9534f; font-weight: bold; }
        .bank-info { background: #e9ecef; padding: 15px; border-radius: 10px; display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container mx-auto">
    <div class="header"><h2>🥟 DUMPLING 委託單</h2></div>
    
    <form id="orderForm">
        <div class="mb-3"><label>姓名 (全名) *</label><input type="text" id="name" class="form-control" required></div>
        <div class="mb-3"><label>Instagram 帳號 *</label><input type="text" id="ig" class="form-control" required></div>
        <div class="mb-3"><label>E-mail *</label><input type="email" id="email" class="form-control" required></div>
        <div class="mb-3"><label>聯絡方式 *</label><input type="text" id="contact" class="form-control" required></div>
        <div class="mb-3"><label>門市 (寄件用)</label><input type="text" id="store" class="form-control"></div>

        <hr>

        <div class="mb-3">
            <label>你想要畫哪一種呢？ *</label>
            <select id="drawType" class="form-select" onchange="updateUI()" required>
                <option value="0" disabled selected>請選擇...</option>
                <option value="450">一般似顏繪 $450</option>
                <option value="580">委託客製圖 $580</option>
            </select>
        </div>

        <div id="noteArea" class="mb-3" style="display:none;">
            <label id="noteLabel" class="fw-bold"></label>
            <textarea id="note" class="form-control" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label>上傳參考照片 *</label>
            <input type="file" id="fileInput" class="form-control" accept="image/*" required>
        </div>

        <hr>

        <div class="mb-3">
            <label>是否製成商品？</label>
            <select id="isProduct" class="form-select" onchange="updateUI()">
                <option value="否">否</option>
                <option value="是">是</option>
            </select>
        </div>

        <div id="productArea" style="display:none;">
            <div class="row mb-2">
                <div class="col-8">明信片 (4張/份) $40</div>
                <div class="col-4"><input type="number" id="qtyPostcard" class="form-control" value="0" min="0" onchange="updateUI()"></div>
            </div>
            <div class="row mb-2">
                <div class="col-8">吊飾 $50/個</div>
                <div class="col-4"><input type="number" id="qtyCharm" class="form-control" value="0" min="0" onchange="updateUI()"></div>
            </div>
        </div>

        <hr>

        <div class="text-end">
            <span>運費：$60</span><br>
            <span class="fw-bold">總金額：</span><span class="price-tag" id="totalPrice">$0</span>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-4 py-3 fw-bold" id="submitBtn">確認送出並顯示匯款帳號</button>
    </form>

    <div id="bankInfo" class="bank-info text-center">
        <h4>🎉 感謝委託！</h4>
        <p>請將金額匯至以下帳號：<br>
        <strong>銀行代碼：000 (XX銀行)</strong><br>
        <strong>帳號：1234-5678-9012</strong><br>
        並於官方 LINE 傳送匯款截圖，謝謝！</p>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx0ZtlF-Vh6lLMuOu9Jvfq8n8pPmHLONQrI-1pez5bvaB0KT4-QZ3xzuwilSjSgw8Ki4Q/exec";

    function updateUI() {
        let drawPrice = parseInt(document.getElementById('drawType').value) || 0;
        let isProduct = document.getElementById('isProduct').value;
        let qtyPostcard = parseInt(document.getElementById('qtyPostcard').value) || 0;
        let qtyCharm = parseInt(document.getElementById('qtyCharm').value) || 0;
        
        // 顯示備註
        const noteArea = document.getElementById('noteArea');
        const noteLabel = document.getElementById('noteLabel');
        if(drawPrice === 450) {
            noteArea.style.display = 'block';
            noteLabel.innerText = "一般似顏繪備註 (照片中必畫部分說明)：";
        } else if (drawPrice === 580) {
            noteArea.style.display = 'block';
            noteLabel.innerText = "委託客製圖備註 (詳細說明希望呈現樣子)：";
        }

        // 顯示商品加購
        document.getElementById('productArea').style.display = (isProduct === '是') ? 'block' : 'none';

        // 計算總金額 (畫圖 + 明信片 + 吊飾 + 運費)
        let total = drawPrice + (qtyPostcard * 40) + (qtyCharm * 50);
        if (drawPrice > 0) total += 60; // 有選畫才加運費
        document.getElementById('totalPrice').innerText = "$" + total;
    }

    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "處理中...";

        const fileInput = document.getElementById('fileInput');
        let fileData = null;
        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            fileData = await new Promise(r => { reader.onload=()=>r(reader.result); reader.readAsDataURL(fileInput.files[0]); });
        }

        const payload = {
            name: document.getElementById('name').value,
            ig: document.getElementById('ig').value,
            email: document.getElementById('email').value,
            contact: document.getElementById('contact').value,
            store: document.getElementById('store').value,
            type: document.getElementById('drawType').selectedOptions[0].text,
            note: document.getElementById('note').value,
            isProduct: document.getElementById('isProduct').value,
            productDetails: `明信片:${document.getElementById('qtyPostcard').value}, 吊飾:${document.getElementById('qtyCharm').value}`,
            totalAmount: document.getElementById('totalPrice').innerText.replace("$",""),
            fileData: fileData,
            fileName: fileInput.files[0].name
        };

        fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
        .then(() => {
            document.getElementById('bankInfo').style.display = 'block';
            btn.style.display = 'none';
            window.scrollTo(0, document.body.scrollHeight);
        });
    });
</script>
</body>
</html>
